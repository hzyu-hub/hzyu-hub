<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 450" width="100%" height="100%">
 <defs>
 <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
 <stop offset="0%" stop-color="#1565C0" />
 <stop offset="100%" stop-color="#002244" />
 </linearGradient>
 
 <style>
 .wave1 { animation: wave 14s linear infinite; }
 .wave2 { animation: wave 20s linear infinite; }
 .wave3 { animation: wave 10s linear infinite; }
 
 @keyframes wave {
 0% { transform: translateX(0); }
 100% { transform: translateX(-1500px); }
 }
 </style>
 </defs>
 
 <rect width="1500" height="450" fill="url(#bg-grad)" />

 <g>
 <path class="wave1" d="M 0 450 V 330 Q 375 400 750 330 T 1500 330 T 2250 330 T 3000 330 V 450 Z" fill="#0d1117" opacity="0.4" />
 <path class="wave2" d="M 0 450 V 370 Q 375 300 750 370 T 1500 370 T 2250 370 T 3000 370 V 450 Z" fill="#0d1117" opacity="0.7" />
 <path class="wave3" d="M 0 450 V 400 Q 375 350 750 400 T 1500 400 T 2250 400 T 3000 400 V 450 Z" fill="#0d1117" />
 </g>

 <text x="750" y="200" font-family="Arial, Helvetica, sans-serif" font-size="95" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">Hi there! 👋 I'm Tom</text>
 <text x="750" y="280" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="normal" fill="#e6edf3" text-anchor="middle" letter-spacing="1">Artificial Intelligence | High-Performance Computing | Computational Sciences</text>
</svg>
