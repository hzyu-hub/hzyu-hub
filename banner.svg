<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="100%" height="100%" role="img" aria-labelledby="title desc">
  <title id="title">Tom Yu profile banner</title>
  <desc id="desc">Dark technical banner for AI, high-performance computing, medical imaging, and computational sciences.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="45%" stop-color="#0b1f36" />
      <stop offset="100%" stop-color="#061019" />
    </linearGradient>

    <radialGradient id="blue-glow" cx="32%" cy="34%" r="55%">
      <stop offset="0%" stop-color="#3aa7ff" stop-opacity="0.34" />
      <stop offset="42%" stop-color="#1565c0" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#1565c0" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="green-glow" cx="78%" cy="64%" r="45%">
      <stop offset="0%" stop-color="#28d17c" stop-opacity="0.18" />
      <stop offset="58%" stop-color="#28d17c" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#28d17c" stop-opacity="0" />
    </radialGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" fill="none" stroke="#8fbfff" stroke-width="1" opacity="0.10" />
    </pattern>

    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .text { font-family: Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif; }
      .scan { animation: scan 7s ease-in-out infinite; }
      .pulse { animation: pulse 3.8s ease-in-out infinite; transform-origin: center; }
      .drift { animation: drift 16s linear infinite; }

      @keyframes scan {
        0%, 100% { transform: translateX(-260px); opacity: 0; }
        18%, 72% { opacity: 0.34; }
        50% { transform: translateX(260px); opacity: 0.22; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.46; }
        50% { opacity: 0.95; }
      }
      @keyframes drift {
        0% { transform: translateX(0); }
        100% { transform: translateX(-240px); }
      }
    </style>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)" />
  <rect width="1500" height="500" fill="url(#blue-glow)" />
  <rect width="1500" height="500" fill="url(#green-glow)" />
  <rect width="1500" height="500" fill="url(#grid)" opacity="0.55" />

  <g class="drift" opacity="0.26">
    <path d="M0 394 C180 344 300 442 480 390 S820 338 1020 396 1320 444 1560 382 1860 348 2040 392" fill="none" stroke="#58a6ff" stroke-width="2" />
    <path d="M0 430 C220 390 320 468 540 426 S860 376 1050 432 1330 466 1560 424 1850 390 2040 430" fill="none" stroke="#2ea043" stroke-width="2" opacity="0.75" />
  </g>

  <g opacity="0.42" stroke="#58a6ff" stroke-width="2" fill="none">
    <path d="M965 120 L1105 82 L1255 145 L1375 112" />
    <path d="M940 255 L1090 218 L1248 288 L1398 244" opacity="0.68" />
    <path d="M1015 372 L1165 318 L1342 354" opacity="0.52" />
  </g>

  <g filter="url(#soft-glow)">
    <circle class="pulse" cx="965" cy="120" r="5" fill="#58a6ff" />
    <circle class="pulse" cx="1105" cy="82" r="4" fill="#79c0ff" />
    <circle class="pulse" cx="1255" cy="145" r="5" fill="#2ea043" />
    <circle class="pulse" cx="1375" cy="112" r="4" fill="#58a6ff" />
    <circle class="pulse" cx="1090" cy="218" r="4" fill="#79c0ff" />
    <circle class="pulse" cx="1248" cy="288" r="5" fill="#58a6ff" />
    <circle class="pulse" cx="1342" cy="354" r="4" fill="#2ea043" />
  </g>

  <g class="scan">
    <rect x="625" y="0" width="120" height="500" fill="#79c0ff" opacity="0.12" transform="skewX(-18)" />
  </g>

  <g transform="translate(118 128)">
    <text class="text" x="0" y="0" font-size="16" font-weight="500" fill="#8fb6d8" letter-spacing="1.8">Algorithm Engineer · MSc Computational Sciences</text>
    <text class="text" x="0" y="88" font-size="82" font-weight="700" fill="#eef3f7" letter-spacing="0.4">Tom</text>
    <rect x="0" y="118" width="560" height="1.5" fill="#6f9fca" opacity="0.56" />
    <text class="text" x="0" y="172" font-size="28" font-weight="500" fill="#bac7d2" letter-spacing="0.2">AI · High-Performance Computing · Medical Imaging</text>

    <g class="text" font-size="16" font-weight="600" letter-spacing="0.35">
      <rect x="0" y="220" width="166" height="38" rx="6" fill="#15314d" opacity="0.72" />
      <text x="20" y="245" fill="#d7e1ea">CUDA / OpenCL</text>

      <rect x="184" y="220" width="156" height="38" rx="6" fill="#1b3d5f" opacity="0.64" />
      <text x="204" y="245" fill="#d7e1ea">ML Deployment</text>

      <rect x="358" y="220" width="172" height="38" rx="6" fill="#1f4a37" opacity="0.66" />
      <text x="378" y="245" fill="#d7e1ea">Volume Imaging</text>
    </g>
  </g>

  <g class="text" opacity="0.18" font-size="15" fill="#c9d1d9" letter-spacing="0.3">
    <text x="960" y="198">for voxel in volume:</text>
    <text x="960" y="228">  optimize(kernel)</text>
    <text x="960" y="258">  deploy(model)</text>
    <text x="960" y="288">  render(scene)</text>
  </g>

  <path d="M0 470 C250 438 390 486 620 462 S950 424 1210 462 1390 486 1500 462 V500 H0 Z" fill="#0d1117" opacity="0.82" />
</svg>
