<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 200" width="100%" height="100%">
 <defs>
 <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
 <stop offset="0%" stop-color="#1565C0" />
 <stop offset="100%" stop-color="#002244" />
 </linearGradient>
 
 <style>
 .wave1 { animation: wave 14s linear infinite; }
 .wave2 { animation: wave 20s linear infinite; }
 .wave3 { animation: wave 10s linear infinite; }
 
 @keyframes wave {
 0% { transform: translateX(0); }
 100% { transform: translateX(-1500px); }
 }
 </style>
 </defs>
 
 <g transform="translate(0, 200) scale(1, -1)">
 <rect width="1500" height="200" fill="url(#bg-grad)" />

 <g>
 <path class="wave1" d="M 0 200 V 147 Q 375 178 750 147 T 1500 147 T 2250 147 T 3000 147 V 200 Z" fill="#0d1117" opacity="0.4" />
 <path class="wave2" d="M 0 200 V 164 Q 375 133 750 164 T 1500 164 T 2250 164 T 3000 164 V 200 Z" fill="#0d1117" opacity="0.7" />
 <path class="wave3" d="M 0 200 V 178 Q 375 156 750 178 T 1500 178 T 2250 178 T 3000 178 V 200 Z" fill="#0d1117" />
 </g>
 </g>
</svg>
