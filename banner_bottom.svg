<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="45%" stop-color="#0b1f36" />
      <stop offset="100%" stop-color="#061019" />
    </linearGradient>

    <radialGradient id="blue-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3aa7ff" stop-opacity="0.22" />
      <stop offset="50%" stop-color="#1565c0" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#1565c0" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="green-glow" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#28d17c" stop-opacity="0.12" />
      <stop offset="60%" stop-color="#28d17c" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#28d17c" stop-opacity="0" />
    </radialGradient>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" fill="none" stroke="#8fbfff" stroke-width="1" opacity="0.10" />
    </pattern>

    <style>
      .drift { animation: drift 16s linear infinite; }

      @keyframes drift {
        0% { transform: translateX(0); }
        100% { transform: translateX(-240px); }
      }
    </style>
  </defs>

  <rect width="1500" height="250" fill="url(#bg)" />
  <rect width="1500" height="250" fill="url(#blue-glow)" />
  <rect width="1500" height="250" fill="url(#green-glow)" />
  <rect width="1500" height="250" fill="url(#grid)" opacity="0.55" />

  <g class="drift" opacity="0.26">
    <path d="M0 140 C180 110 300 170 480 135 S820 105 1020 145 1320 175 1560 130 1860 110 2040 145" fill="none" stroke="#58a6ff" stroke-width="2" />
    <path d="M0 170 C220 145 320 195 540 160 S860 130 1050 168 1330 195 1560 162 1850 140 2040 170" fill="none" stroke="#2ea043" stroke-width="2" opacity="0.75" />
  </g>

  <path d="M0 220 C250 195 390 230 620 212 S950 185 1210 212 1390 230 1500 212 V250 H0 Z" fill="#0d1117" opacity="0.82" />
</svg>
