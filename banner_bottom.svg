<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 150" width="100%" height="100%">
 <defs>
 <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
 <stop offset="0%" stop-color="#1565C0" />
 <stop offset="100%" stop-color="#002244" />
 </linearGradient>
 
 <style>
 .wave1 { animation: wave 14s linear infinite; }
 .wave2 { animation: wave 20s linear infinite; }
 .wave3 { animation: wave 10s linear infinite; }
 
 @keyframes wave {
 0% { transform: translateX(0); }
 100% { transform: translateX(-1500px); }
 }
 </style>
 </defs>
 
 <g transform="translate(0, 150) scale(1, -1)">
 <rect width="1500" height="150" fill="url(#bg-grad)" />

 <g>
 <path class="wave1" d="M 0 150 V 30 Q 375 120 750 30 T 1500 30 T 2250 30 T 3000 30 V 150 Z" fill="#0d1117" opacity="0.4" />
 <path class="wave2" d="M 0 150 V 60 Q 375 90 750 60 T 1500 60 T 2250 60 T 3000 60 V 150 Z" fill="#0d1117" opacity="0.7" />
 <path class="wave3" d="M 0 150 V 95 Q 375 110 750 95 T 1500 95 T 2250 95 T 3000 95 V 150 Z" fill="#0d1117" />
 </g>
 </g>
</svg>
